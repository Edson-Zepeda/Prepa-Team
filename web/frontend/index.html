<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Simulador Academico GPA</title>
    <style>
      :root {
        --bg: #f6f1e8;
        --card: #fffaf0;
        --ink: #24211c;
        --muted: #71695e;
        --accent: #1f6f54;
        --warn: #b84a3a;
        --line: #e3d6c2;
      }

      body {
        margin: 0;
        font-family: Georgia, "Times New Roman", serif;
        background: radial-gradient(circle at top left, #e0ead7, transparent 32rem), var(--bg);
        color: var(--ink);
      }

      main {
        max-width: 1080px;
        margin: 0 auto;
        padding: 40px 20px;
      }

      .hero {
        margin-bottom: 28px;
      }

      h1 {
        font-size: clamp(2rem, 5vw, 4rem);
        line-height: 0.95;
        margin: 0 0 12px;
      }

      p {
        color: var(--muted);
        line-height: 1.55;
      }

      .grid {
        display: grid;
        grid-template-columns: minmax(0, 1fr) minmax(320px, 0.8fr);
        gap: 22px;
      }

      .card {
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: 22px;
        padding: 22px;
        box-shadow: 0 18px 45px rgba(67, 48, 27, 0.12);
      }

      form {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 14px;
      }

      label {
        display: grid;
        gap: 6px;
        color: var(--muted);
        font-size: 0.92rem;
      }

      input,
      select,
      button {
        border: 1px solid var(--line);
        border-radius: 12px;
        padding: 11px 12px;
        font: inherit;
      }

      input,
      select {
        background: white;
      }

      button {
        grid-column: 1 / -1;
        background: var(--accent);
        color: white;
        cursor: pointer;
        font-weight: 700;
      }

      .metric {
        display: grid;
        gap: 6px;
        margin-bottom: 16px;
        padding-bottom: 16px;
        border-bottom: 1px solid var(--line);
      }

      .metric strong {
        font-size: 2rem;
      }

      .warning {
        color: var(--warn);
        font-weight: 700;
      }

      @media (max-width: 820px) {
        .grid,
        form {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <section class="hero">
        <h1>Simulador de rendimiento academico</h1>
        <p>
          Captura tus datos academicos y recibe una estimacion de GPA, probabilidad de buen rendimiento y acciones
          sugeridas para mejorar. Es una herramienta de apoyo, no una garantia de calificacion.
        </p>
      </section>

      <section class="grid">
        <div class="card">
          <form id="student-form">
            <label>Edad <input name="Age" type="number" min="10" max="25" value="17" required /></label>
            <label>Horas de estudio por semana <input name="StudyTimeWeekly" type="number" min="0" max="20" step="0.5" value="8" required /></label>
            <label>Ausencias <input name="Absences" type="number" min="0" max="30" value="10" required /></label>
            <label>Educacion parental <input name="ParentalEducation" type="number" min="0" max="4" value="2" required /></label>
            <label>Tutoring <select name="Tutoring"><option value="0">No</option><option value="1">Si</option></select></label>
            <label>Apoyo parental <input name="ParentalSupport" type="number" min="0" max="4" value="2" required /></label>
            <label>Extracurricular <select name="Extracurricular"><option value="0">No</option><option value="1">Si</option></select></label>
            <label>Sports <select name="Sports"><option value="1">Si</option><option value="0">No</option></select></label>
            <label>Music <select name="Music"><option value="0">No</option><option value="1">Si</option></select></label>
            <label>Volunteering <select name="Volunteering"><option value="0">No</option><option value="1">Si</option></select></label>
            <button type="submit">Calcular recomendacion</button>
          </form>
        </div>

        <aside class="card" id="result">
          <p>Ejecuta la API y envia el formulario para ver resultados.</p>
        </aside>
      </section>
    </main>

    <script>
      const API_URL = "http://127.0.0.1:8000/predict";
      const form = document.querySelector("#student-form");
      const result = document.querySelector("#result");

      form.addEventListener("submit", async (event) => {
        event.preventDefault();
        result.innerHTML = "<p>Calculando...</p>";

        const data = Object.fromEntries(new FormData(form).entries());
        for (const key of Object.keys(data)) {
          data[key] = Number(data[key]);
        }

        try {
          const response = await fetch(API_URL, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(data),
          });
          const body = await response.json();

          if (!body.ok) {
            result.innerHTML = `<p class="warning">${body.errors.map((error) => `${error.field}: ${error.message}`).join("<br>")}</p>`;
            return;
          }

          result.innerHTML = `
            <div class="metric"><span>GPA estimado</span><strong>${body.estimated_gpa}</strong></div>
            <div class="metric"><span>Probabilidad de buen rendimiento</span><strong>${Math.round(body.good_performance_probability * 100)}%</strong></div>
            <div class="metric"><span>Nivel</span><strong>${body.risk_level}</strong></div>
            <h2>Plan recomendado</h2>
            <p>${body.recommended_plan.plan}</p>
            <p><strong>GPA con plan:</strong> ${body.recommended_plan.estimated_gpa_after}</p>
            <p><strong>Probabilidad con plan:</strong> ${Math.round(body.recommended_plan.probability_after * 100)}%</p>
            <h2>Mensajes</h2>
            <ul>${body.messages.map((message) => `<li>${message}</li>`).join("")}</ul>
          `;
        } catch (error) {
          result.innerHTML = "<p class='warning'>No se pudo conectar con la API. Ejecuta: uvicorn web.backend.app:app --reload</p>";
        }
      });
    </script>
  </body>
</html>
